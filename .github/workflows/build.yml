name: Build & Release (Android & Windows)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Job 1: Windows
  build-windows:
    name: Windows Build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows
        run: flutter build windows --release

      - name: Download VC++ Redistributable
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://aka.ms/vs/17/release/vc_redist.x64.exe" -OutFile "windows/vc_redist.x64.exe"

      - name: Verify build output
        shell: pwsh
        run: |
          if (-Not (Test-Path "build/windows/x64/runner/Release/simple_sale.exe")) {
            Write-Error "Build output not found!"
            exit 1
          }
          Write-Host "Build output verified."

      - name: Create Installer (Inno Setup)
        shell: pwsh
        run: iscc windows/installer.iss

      - name: Upload Windows Setup
        uses: actions/upload-artifact@v4
        with:
          name: simple-sale-windows-setup
          path: build/windows/x64/runner/Release/installer/SimpleSale_Setup.exe

  # Job 2: Android
  build-android:
    name: Android Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Android APK
        run: flutter build apk --release

      - name: Build Android AppBundle
        run: flutter build appbundle --release

      - name: Upload Android Build
        uses: actions/upload-artifact@v4
        with:
          name: simple-sale-android
          path: build/app/outputs/flutter-apk/app-release.apk

  # Job 3: Create Release
  create-release:
    name: Create Release
    needs: [build-windows, build-android]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download Windows Setup
        uses: actions/download-artifact@v4
        with:
          name: simple-sale-windows-setup

      - name: Download Android Build
        uses: actions/download-artifact@v4
        with:
          name: simple-sale-android

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            SimpleSale_Setup.exe
            app-release.apk
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
